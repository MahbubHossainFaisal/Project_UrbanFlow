version: 2

models:
  - name: stg_zone_lookup
    description: "Cleaned NYC Taxi Zone lookup table. Reference for all geographic joins"
    columns:
      - name: location_id
        description: "Primary key for taxi zones."
        tests:
          - unique
          - not_null
      - name: borough
        description: "The NYC borough names (Manhattan, Brooklyn, etc.)"
        tests:
          - not_null
  
  - name: stg_weather_hourly
    description: "Cleaned hourly weather data. One row per hour"
    columns:
      - name: weather_time
        tests:
          - unique
          - not_null
  
  - name: stg_taxi_trips
    description: "Cleaned and filtered NYC Yellow Taxi trip records."
    columns:
      - name: trip_id
        tests:
          - unique
          - not_null